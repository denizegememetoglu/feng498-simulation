<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Warehouse Simulation 3D — FENG 498</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; touch-action: none; }
canvas { display: block; }
#hud {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.82); color: #fff; padding: 12px 14px;
  border-radius: 10px; font-size: 12px; line-height: 1.6;
  backdrop-filter: blur(10px); min-width: 200px; z-index: 10;
  border: 1px solid rgba(255,255,255,0.08);
}
#hud h2 { font-size: 14px; margin-bottom: 6px; color: #4fc3f7; letter-spacing: 0.5px; }
#hud .label { color: #999; }
#hud .val { color: #eee; font-weight: 600; }
#controls {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.82); color: #fff; padding: 8px 14px;
  border-radius: 10px; font-size: 11px; display: flex; gap: 10px; align-items: center;
  backdrop-filter: blur(10px); z-index: 10; flex-wrap: wrap; justify-content: center;
  max-width: 95vw; border: 1px solid rgba(255,255,255,0.08);
}
#controls button {
  background: #4fc3f7; color: #000; border: none; padding: 6px 12px;
  border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 11px;
}
#controls button:hover { background: #81d4fa; }
#controls button.active { background: #ff9800; }
#controls input[type=range] { width: 80px; accent-color: #4fc3f7; }
#policy-select {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.82); color: #fff; padding: 8px 12px;
  border-radius: 10px; backdrop-filter: blur(10px); z-index: 10;
  border: 1px solid rgba(255,255,255,0.08);
}
#policy-select select {
  background: #222; color: #fff; border: 1px solid #444;
  padding: 5px 8px; border-radius: 4px; font-size: 12px;
}
#legend {
  position: absolute; bottom: 60px; right: 10px;
  background: rgba(0,0,0,0.82); color: #fff; padding: 10px 12px;
  border-radius: 10px; font-size: 10px; line-height: 1.8;
  backdrop-filter: blur(10px); z-index: 10;
  border: 1px solid rgba(255,255,255,0.08);
}
@media (max-width: 768px) {
  #hud { font-size: 10px; padding: 8px 10px; min-width: 130px; }
  #hud h2 { font-size: 11px; }
  #controls { font-size: 10px; padding: 6px 8px; gap: 4px; bottom: 6px; max-width: 98vw; }
  #controls button { padding: 5px 8px; font-size: 10px; }
  #controls input[type=range] { width: 45px; }
  #controls .desktop-only { display: none; }
  #legend { display: none; }
  #policy-select { top: auto; bottom: 52px; right: 10px; left: 10px; text-align: center; }
}
.ld { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>

<div id="hud">
  <h2>WAREHOUSE SIMULATION</h2>
  <div><span class="label">Time: </span><span class="val" id="hud-time">00:00</span></div>
  <div><span class="label">Orders: </span><span class="val" id="hud-orders">0</span></div>
  <div><span class="label">RT Busy: </span><span class="val" id="hud-rt">0 / 7</span></div>
  <div><span class="label">Picks: </span><span class="val" id="hud-picks">0</span></div>
  <div><span class="label">Avg Prep: </span><span class="val" id="hud-prep">-</span></div>
  <div><span class="label">Milkrun: </span><span class="val" id="hud-milkrun">-</span></div>
</div>

<div id="policy-select">
  <label>Policy: </label>
  <select id="policy">
    <option value="usage" selected>Usage-based ABC</option>
    <option value="baseline">Baseline (Heuristic)</option>
    <option value="double">Double ABC</option>
    <option value="travel">Travel-distance Optimized</option>
  </select>
</div>

<div id="legend">
  <div><span class="ld" style="background:#4fc3f7"></span>Operator</div>
  <div><span class="ld" style="background:#f57f17"></span>Reach Truck</div>
  <div><span class="ld" style="background:#4caf50"></span>Kitting Area</div>
  <div><span class="ld" style="background:#f9a825"></span>Kit-corridor Rack</div>
  <div><span class="ld" style="background:#607d8b"></span>RT-only Rack</div>
  <div><span class="ld" style="background:#1565c0"></span>Kardex</div>
  <div><span class="ld" style="background:#00bfa5"></span>Milkrun</div>
  <div style="margin-top:4px;border-top:1px solid #444;padding-top:4px">
    <div><span class="ld" style="background:#bcaaa4"></span>3-pallet bay</div>
    <div><span class="ld" style="background:#fb8c00"></span>2-pallet feeder</div>
    <div><span class="ld" style="background:#e53935"></span>1-pallet feeder</div>
  </div>
</div>

<div id="controls">
  <button id="btn-play">Pause</button>
  <span>Speed:</span>
  <input type="range" id="speed" min="1" max="200" value="30">
  <span id="speed-label">30x</span>
  <button id="btn-cam">Camera: Free</button>
  <span class="desktop-only" style="color:#666">| Scroll: zoom · Drag: rotate</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let CSS2DRenderer, CSS2DObject;
let useLabels = false;
try {
  ({ CSS2DRenderer, CSS2DObject } = await import('three/addons/renderers/CSS2DRenderer.js'));
  useLabels = true;
} catch(e) { console.warn('CSS2D labels not available:', e); }

// ── Mobile detection ────────────────────────────────────────────────────────
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || innerWidth < 900;

// ── Load layout from config/layout.json ─────────────────────────────────────
// GitHub Pages serves docs/ as the site root, so ../config/ is unreachable.
// Try a sibling layout.json first (docs/layout.json is committed alongside this
// file and synced from config/layout.json); fall back to ../config/layout.json
// for local dev when serving the repo root over http.server.
async function loadLayout() {
  for (const url of ['./layout.json', '../config/layout.json']) {
    try {
      const r = await fetch(url);
      if (r.ok) return await r.json();
    } catch (_) { /* keep trying */ }
  }
  throw new Error('Could not load layout.json from ./layout.json or ../config/layout.json');
}
const LAYOUT = await loadLayout();

const C = {
  FM_MAX_LV: LAYOUT.fast_mover_max_level,
  RACK_DEPTH: LAYOUT.rack_depth_m,
  RACK_H: LAYOUT.rack_height_m,
  NUM_RT: 7, NUM_OPS: 8,
  WALK_SPD: 50/60, RT_SPD: 100/60, RT_LIFT: 15, RT_PICK: 30, OP_PICK: 18,
  SHIFT: 28800, ORDERS: 300, ITEMS_MIN: 5, ITEMS_MAX: 15,
};

const BUILD = LAYOUT.building;
const KIT = LAYOUT.kitting;

// Coordinate convention: layout x → three.js x; layout y → three.js -z.
// Building floor is the x-z plane, height is +y.
function layoutToWorld(x, y) {
  return new THREE.Vector3(x, 0, -y);
}

// ── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
camera.position.set(BUILD.width_m * 0.6, 35, 20);

const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
renderer.shadowMap.enabled = !isMobile;
if (!isMobile) renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

let labelRenderer = null;
if (useLabels) {
  labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(innerWidth, innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.body.appendChild(labelRenderer.domElement);
}

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(BUILD.width_m / 2, 2, -BUILD.depth_m / 2);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.48;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 1.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(BUILD.width_m * 0.5, 50, BUILD.depth_m * -0.2);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -BUILD.width_m; sun.shadow.camera.right = BUILD.width_m;
sun.shadow.camera.top = BUILD.depth_m; sun.shadow.camera.bottom = -BUILD.depth_m;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));

// Floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(BUILD.width_m, BUILD.depth_m),
  new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.9 })
);
floor.rotation.x = -Math.PI/2;
floor.position.set(BUILD.width_m / 2, 0, -BUILD.depth_m / 2);
floor.receiveShadow = true;
scene.add(floor);

// ── Helpers ────────────────────────────────────────────────────────────────
function mkMesh(geo, mat, x, y, z, rx, ry, rz) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x||0, y||0, z||0);
  if (rx||ry||rz) m.rotation.set(rx||0, ry||0, rz||0);
  return m;
}
function makeLabel(text, pos, color = '#fff', fontSize = '11px') {
  if (!useLabels) return null;
  const div = document.createElement('div');
  div.textContent = text;
  div.style.cssText = `color:${color};font-size:${fontSize};font-family:'Segoe UI',sans-serif;font-weight:600;text-shadow:0 0 6px rgba(0,0,0,0.8);pointer-events:none;`;
  const lbl = new CSS2DObject(div);
  lbl.position.copy(pos);
  scene.add(lbl);
  return lbl;
}

// ── Render racks from layout.json ──────────────────────────────────────────
const segmentInfo = []; // {rack_id, segment_index, start, end, length, dir, perp, bays, levels, hasKit, pallets_per_bay, bay_code_start}
const positions = []; // flat list of {rack_id, segment_index, bay_index, level, x, y, hasKit, freq}

// Expand `bay_overrides` (matches src/warehouse.py _expand_bay_overrides).
function expandBayOverrides(seg) {
  const out = {};
  for (const ovr of seg.bay_overrides || []) {
    const rec = { ...ovr };
    delete rec.bays;
    for (const bayCode of ovr.bays || []) out[bayCode] = rec;
  }
  return out;
}

// Pallet colour by width — visually distinguishes feeder bays.
const palletColorByWidth = { 1: 0xe53935, 2: 0xfb8c00, 3: 0xbcaaa4 };

for (const rack of LAYOUT.racks) {
  for (let si = 0; si < rack.segments.length; si++) {
    const seg = rack.segments[si];
    const sx = seg.start[0], sy = seg.start[1];
    const ex = seg.end[0], ey = seg.end[1];
    const dx = ex - sx, dy = ey - sy;
    const length = Math.sqrt(dx*dx + dy*dy);
    const dirX = dx / length, dirY = dy / length;
    const perpX = -dirY, perpY = dirX;
    const hasKit = seg.kit_corridor_side && seg.kit_corridor_side !== 'TBD'
      || (seg.kit_corridor_side === 'TBD'); // optimistic per ASSUMPTIONS §11

    const segData = {
      rack_id: rack.id, segment_index: si,
      sx, sy, ex, ey, dirX, dirY, perpX, perpY, length,
      bays: seg.bays, levels: seg.levels, hasKit,
      pallets_per_bay: seg.pallets_per_bay, bay_code_start: seg.bay_code_start,
    };
    segmentInfo.push(segData);

    // Render the rack segment as a single box per level for performance
    const rackColor = hasKit ? 0xf9a825 : 0x90a4ae;
    const rackMat = new THREE.MeshStandardMaterial({
      color: rackColor, roughness: 0.5, metalness: 0.2,
      emissive: rackColor, emissiveIntensity: 0.04
    });
    const metalMat = new THREE.MeshStandardMaterial({ color: 0x78909c, metalness: 0.6, roughness: 0.3 });

    const cx = (sx + ex) / 2;
    const cy = (sy + ey) / 2;
    const angle = Math.atan2(dy, dx); // angle in layout x-y plane
    const lvH = C.RACK_H / seg.levels;
    const bayWidthM = length / seg.bays;
    const slotsInBay = 3; // physical pallet slot grid per bay (max width)

    const overrides = expandBayOverrides(seg);
    const defaultWidth = seg.pallets_per_bay;
    const defaultOffset = seg.position_offset || 0;

    // Shelves: one box per level
    for (let lv = 0; lv < seg.levels; lv++) {
      const shelf = new THREE.Mesh(
        new THREE.BoxGeometry(length, 0.08, C.RACK_DEPTH),
        rackMat
      );
      shelf.position.set(cx, lv * lvH + 0.05, -cy);
      shelf.rotation.y = -angle; // flip sign because layout y → -z
      shelf.receiveShadow = true;
      scene.add(shelf);

      // Render actual pallet positions: width per bay from bay_overrides,
      // skip width-0 bays (J12 cart slot), colour by width.
      // On mobile, only render lower 3 levels for performance.
      if (isMobile && lv >= 3) continue;
      for (let b = 0; b < seg.bays; b++) {
        const bayCode = seg.bay_code_start + b;
        const ovr = overrides[bayCode] || {};
        const width = ovr.pallets_per_bay !== undefined ? ovr.pallets_per_bay : defaultWidth;
        const offset = ovr.position_offset !== undefined ? ovr.position_offset : defaultOffset;
        if (width <= 0) continue; // reserved bay (cart slot)

        const palletMat = new THREE.MeshStandardMaterial({
          color: palletColorByWidth[width] || 0xbcaaa4, roughness: 0.85
        });
        const palletW = bayWidthM / slotsInBay * 0.88;
        const palletH = 0.18;
        const palletGeo = new THREE.BoxGeometry(palletW, palletH, C.RACK_DEPTH * 0.7);
        for (let p = 1 + offset; p < 1 + offset + width; p++) {
          // Slot p (1..3) centre at fraction (p - 0.5) / slotsInBay across the bay.
          const segT = (b + (p - 0.5) / slotsInBay) / seg.bays;
          const px = sx + dx * segT;
          const py = sy + dy * segT;
          const pallet = new THREE.Mesh(palletGeo, palletMat);
          pallet.position.set(px, lv * lvH + 0.05 + palletH/2 + 0.02, -py);
          pallet.rotation.y = -angle;
          scene.add(pallet);
        }
      }
    }

    // Uprights
    for (let b = 0; b <= seg.bays; b++) {
      const t = b / seg.bays;
      const ux = sx + dx * t;
      const uy = sy + dy * t;
      const u = new THREE.Mesh(new THREE.BoxGeometry(0.12, C.RACK_H, C.RACK_DEPTH), metalMat);
      u.position.set(ux, C.RACK_H/2, -uy);
      u.rotation.y = -angle;
      u.castShadow = true;
      scene.add(u);
    }

    // Build position records for the simulation (one entry per actual pallet
    // position, not per bay — matches src/warehouse.py).
    for (let b = 0; b < seg.bays; b++) {
      const bayCode = seg.bay_code_start + b;
      const ovr = overrides[bayCode] || {};
      const width = ovr.pallets_per_bay !== undefined ? ovr.pallets_per_bay : defaultWidth;
      if (width <= 0) continue;
      const t = (b + 0.5) / seg.bays;
      const bx = sx + dx * t;
      const by = sy + dy * t;
      for (let lv = 0; lv < seg.levels; lv++) {
        positions.push({
          rack_id: rack.id, segment_index: si, bay_index: b, level: lv,
          x: bx, y: by, hasKit, lvH,
        });
      }
    }

    // Rack label at the start
    makeLabel(rack.id,
      new THREE.Vector3(sx - 1, C.RACK_H + 0.5, -sy),
      hasKit ? '#f9a825' : '#90a4ae', '14px');

    // KÜÇÜK RF small-rack marker on detached single-bay segments
    // (J13, U14 per the rack PDFs).
    if (seg.small_rack) {
      makeLabel('KÜÇÜK RF',
        new THREE.Vector3(cx, C.RACK_H + 0.2, -cy),
        '#ffd54f', '10px');
    }

    // Kit-corridor production-line label, where wired in layout.json.
    if (seg.kit_corridor_line) {
      const lineLabelOffset = 2.5; // m from rack face on the kit side
      const labelPos = new THREE.Vector3(
        cx + perpX * lineLabelOffset, 0.6, -(cy + perpY * lineLabelOffset)
      );
      makeLabel(seg.kit_corridor_line, labelPos, '#81c784', '10px');
    }
  }
}

// ── Closed-junction X marks (J↔G and J↔U) ──────────────────────────────────
for (const jct of (LAYOUT.closed_junctions || [])) {
  const xMat = new THREE.MeshStandardMaterial({
    color: 0xef5350, emissive: 0xef5350, emissiveIntensity: 0.3, roughness: 0.6
  });
  for (const angle of [Math.PI / 4, -Math.PI / 4]) {
    const bar = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.05, 0.25), xMat);
    bar.position.set(jct.x, 0.06, -jct.y);
    bar.rotation.y = angle;
    scene.add(bar);
  }
  if (jct._label) {
    makeLabel(jct._label,
      new THREE.Vector3(jct.x, 1.2, -jct.y), '#ef5350', '9px');
  }
}

// ── Building walls ──────────────────────────────────────────────────────────
const wallMat = new THREE.MeshStandardMaterial({ color: 0x78909c, roughness: 0.7 });
const wallH = 9;
// North wall (y = depth)
scene.add(mkMesh(new THREE.BoxGeometry(BUILD.width_m, wallH, 0.3), wallMat,
  BUILD.width_m / 2, wallH / 2, -BUILD.depth_m));
// East wall (x = width)
scene.add(mkMesh(new THREE.BoxGeometry(0.3, wallH, BUILD.depth_m), wallMat,
  BUILD.width_m, wallH / 2, -BUILD.depth_m / 2));
// West wall (x = 0)
scene.add(mkMesh(new THREE.BoxGeometry(0.3, wallH, BUILD.depth_m), wallMat,
  0, wallH / 2, -BUILD.depth_m / 2));

// ── Kitting area ───────────────────────────────────────────────────────────
const kitFloor = new THREE.Mesh(
  new THREE.BoxGeometry(KIT.width_m, 0.08, KIT.depth_m),
  new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 0.6 })
);
kitFloor.position.set(KIT.x + KIT.width_m / 2, 0.04, -(KIT.y + KIT.depth_m / 2));
scene.add(kitFloor);
for (let i = 0; i < 3; i++) {
  const table = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 1),
    new THREE.MeshStandardMaterial({ color: 0x795548, roughness: 0.8 }));
  table.position.set(KIT.x + 2 + i * 3, 0.4, -(KIT.y + KIT.depth_m / 2));
  table.castShadow = true;
  scene.add(table);
}
const KITTING = new THREE.Vector3(KIT.x + KIT.width_m / 2, 0, -(KIT.y + KIT.depth_m / 2));
makeLabel('KIT HAZIRLAMA', new THREE.Vector3(KITTING.x, 2.5, KITTING.z), '#4caf50', '13px');

// ── Kardex ──────────────────────────────────────────────────────────────────
const KDX = LAYOUT.kardex;
const kdxFloor = new THREE.Mesh(
  new THREE.BoxGeometry(KDX.width_m, 0.08, KDX.depth_m),
  new THREE.MeshStandardMaterial({ color: 0x0d2654, roughness: 0.6 })
);
kdxFloor.position.set(KDX.x + KDX.width_m / 2, 0.04, -(KDX.y + KDX.depth_m / 2));
scene.add(kdxFloor);
for (let i = 0; i < 4; i++) {
  const k = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.5, 2),
    new THREE.MeshStandardMaterial({ color: 0x1565c0, roughness: 0.4, metalness: 0.3 }));
  k.position.set(KDX.x + KDX.width_m / 2, 2.25, -(KDX.y + 2 + i * 3));
  k.castShadow = true;
  scene.add(k);
}
makeLabel('KARDEX',
  new THREE.Vector3(KDX.x + KDX.width_m / 2, 5.5, -(KDX.y + KDX.depth_m / 2)),
  '#42a5f5', '12px');

// ── Trolley staging ─────────────────────────────────────────────────────────
const TRO = LAYOUT.trolley_staging;
const trolleyFloor = new THREE.Mesh(
  new THREE.BoxGeometry(TRO.width_m, 0.04, TRO.depth_m),
  new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.7 })
);
trolleyFloor.position.set(TRO.x + TRO.width_m / 2, 0.02, -(TRO.y + TRO.depth_m / 2));
scene.add(trolleyFloor);
for (let i = 0; i < 8; i++) {
  const tg = new THREE.Group();
  const trolleyBase = mkMesh(new THREE.BoxGeometry(0.7, 0.08, 1.0),
    new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.7 }), 0, 0.25, 0);
  tg.add(trolleyBase);
  tg.position.set(TRO.x + 1 + (i % 4) * 3, 0, -(TRO.y + 1 + Math.floor(i / 4) * 1.5));
  scene.add(tg);
}

// ── Operator / RT models (unchanged from previous) ─────────────────────────
const opColors = [0x4fc3f7, 0x81c784, 0xffb74d, 0xf06292, 0xba68c8, 0x4dd0e1, 0xaed581, 0xff8a65];
function createOp(color) {
  const g = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color: 0xffccbc, roughness: 0.7 });
  const vest = new THREE.MeshStandardMaterial({ color, roughness: 0.5 });
  const pants = new THREE.MeshStandardMaterial({ color: 0x37474f });
  const shoes = new THREE.MeshStandardMaterial({ color: 0x212121 });
  for (let s of [-0.1, 0.1]) {
    g.add(mkMesh(new THREE.BoxGeometry(0.12, 0.1, 0.2), shoes, s, 0.05, 0.02));
    g.add(mkMesh(new THREE.CylinderGeometry(0.055, 0.065, 0.55, 6), pants, s, 0.38, 0));
  }
  g.add(mkMesh(new THREE.BoxGeometry(0.32, 0.45, 0.18), vest, 0, 0.9, 0));
  for (let s of [-0.2, 0.2]) {
    g.add(mkMesh(new THREE.CylinderGeometry(0.035, 0.04, 0.4, 6), skin, s, 0.85, 0));
  }
  g.add(mkMesh(new THREE.CylinderGeometry(0.045, 0.05, 0.08, 6), skin, 0, 1.2, 0));
  g.add(mkMesh(new THREE.SphereGeometry(0.12, 10, 10), skin, 0, 1.35, 0));
  const hatMat = new THREE.MeshStandardMaterial({ color: 0xfdd835, roughness: 0.4 });
  g.add(mkMesh(new THREE.SphereGeometry(0.13, 10, 6, 0, Math.PI*2, 0, Math.PI/2), hatMat, 0, 1.45, 0));
  return g;
}
function createRT() {
  const g = new THREE.Group();
  const body = new THREE.MeshStandardMaterial({ color: 0xf57f17, metalness: 0.25, roughness: 0.4 });
  const metal = new THREE.MeshStandardMaterial({ color: 0x424242, metalness: 0.8, roughness: 0.2 });
  const dark = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
  g.add(mkMesh(new THREE.BoxGeometry(1, 0.14, 1.8), dark, 0, 0.14, 0));
  g.add(mkMesh(new THREE.BoxGeometry(0.9, 0.55, 1.2), body, 0, 0.5, 0.2));
  g.add(mkMesh(new THREE.BoxGeometry(0.95, 0.45, 0.4),
    new THREE.MeshStandardMaterial({ color: 0xe65100 }), 0, 0.45, 0.75));
  for (let dx of [-0.14, 0.14]) {
    g.add(mkMesh(new THREE.BoxGeometry(0.05, 3.2, 0.05), metal, dx, 1.82, -0.65));
  }
  for (let s of [-0.11, 0.11]) {
    g.add(mkMesh(new THREE.BoxGeometry(0.05, 0.035, 1), metal, s, 0.2, -1.15));
  }
  for (let dx of [-0.45, 0.45]) {
    g.add(mkMesh(new THREE.CylinderGeometry(0.17, 0.17, 0.09, 10), dark, dx, 0.11, -0.4, 0, 0, Math.PI/2));
  }
  return g;
}

// ── Pick navigation: walk to a point next to the bay, offset along perpendicular ──
function getPickAislePos(pos) {
  // pos: {x, y, segment_index} → world point next to the rack on its kit-corridor side
  const seg = segmentInfo.find(s => s.rack_id === pos.rack_id && s.segment_index === pos.segment_index);
  if (!seg) return KITTING.clone();
  const offset = 1.5; // 1.5 m from rack face
  const px = pos.x + seg.perpX * offset;
  const py = pos.y + seg.perpY * offset;
  return new THREE.Vector3(px, 0, -py);
}

// ── Spawn entities ──────────────────────────────────────────────────────────
const operators = [];
for (let i = 0; i < C.NUM_OPS; i++) {
  const m = createOp(opColors[i % opColors.length]);
  m.position.copy(KITTING);
  m.position.x += i * 0.7;
  scene.add(m);
  operators.push({ mesh: m, state: 'idle', target: null, from: null, progress: 0,
    pickList: [], pickIdx: 0, orderStart: 0, _rtIdx: -1 });
}
const reachTrucks = [];
for (let i = 0; i < C.NUM_RT; i++) {
  const m = createRT();
  m.position.set(2 + i * 1.8, 0, -3);
  scene.add(m);
  reachTrucks.push({ mesh: m, busy: false, timer: 0 });
}

// ── Simulation state ────────────────────────────────────────────────────────
let simTime = 0, totalPicks = 0, totalOrders = 0, totalPrepTime = 0;
let orderQueue = [], paused = false, speedMult = 30;
let pickFlashes = [];

function genFreqs(policy) {
  // Compute "demand frequency" for each position based on policy
  const rng = mulberry32(42);
  const maxLevel = Math.max(...positions.map(p => p.level));
  positions.forEach(p => {
    let f;
    if (policy === 'usage') {
      f = (1 - p.level / maxLevel) * (p.hasKit ? 1.0 : 0.6) * (1 + rng() * 0.3);
    } else if (policy === 'baseline') {
      const fm = p.hasKit && p.level < C.FM_MAX_LV;
      f = fm ? (0.5 + rng() * 0.5) : rng() * 0.3;
    } else if (policy === 'double') {
      f = (p.hasKit && p.level < 3) ? 0.7 : (p.level < 5 ? 0.3 : 0.1);
      f += rng() * 0.2;
    } else {
      // travel: closer to kitting = higher demand
      const wp = layoutToWorld(p.x, p.y);
      const d = wp.distanceTo(KITTING);
      f = Math.max(0, 1 - d / 70);
    }
    p.freq = f;
  });
  const mx = positions.reduce((m, p) => Math.max(m, p.freq), 1e-9);
  positions.forEach(p => p.freq /= mx);
}
function mulberry32(a) { return function() { a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; } }

function pickMats(n) {
  const total = positions.reduce((s, p) => s + p.freq, 0);
  const out = [];
  for (let i = 0; i < n; i++) {
    let r = Math.random() * total;
    for (const p of positions) { r -= p.freq; if (r <= 0) { out.push(p); break; } }
  }
  return out;
}
function genOrder() {
  const n = C.ITEMS_MIN + Math.floor(Math.random() * (C.ITEMS_MAX - C.ITEMS_MIN + 1));
  const items = pickMats(n);
  const sorted = []; let cur = KITTING.clone(); const rem = [...items];
  while (rem.length) {
    let bi = 0, bd = Infinity;
    for (let i = 0; i < rem.length; i++) {
      const d = cur.distanceTo(getPickAislePos(rem[i]));
      if (d < bd) { bd = d; bi = i; }
    }
    sorted.push(rem.splice(bi, 1)[0]);
    cur = getPickAislePos(sorted[sorted.length - 1]);
  }
  return sorted;
}
function needsRT(p) { return !(p.hasKit && p.level < C.FM_MAX_LV); }
function getAvailRT() { return reachTrucks.findIndex(r => !r.busy); }

const flashGeo = new THREE.SphereGeometry(0.25, 8, 8);
function addFlash(p) {
  const m = new THREE.Mesh(flashGeo,
    new THREE.MeshStandardMaterial({ color: 0xff5252, emissive: 0xff5252, emissiveIntensity: 0.8, transparent: true }));
  m.position.set(p.x, p.level * p.lvH + 0.3, -p.y);
  scene.add(m);
  pickFlashes.push({ mesh: m, timer: 0.4 });
}

// ── Camera modes ────────────────────────────────────────────────────────────
let camMode = 'free';
let followOpIdx = 0;
let cinematicAngle = 0;

// ── Main loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let orderTimer = 0;
genFreqs('usage');

function update() {
  const rawDt = clock.getDelta();
  if (paused) return;
  const dt = rawDt * speedMult;
  simTime += dt;

  if (simTime > C.SHIFT) { simTime = 0; totalPicks = 0; totalOrders = 0; totalPrepTime = 0; }

  orderTimer += dt;
  const oi = C.SHIFT / C.ORDERS;
  while (orderTimer >= oi) { orderTimer -= oi; orderQueue.push(genOrder()); }

  for (const op of operators) {
    if (op.state === 'idle' && orderQueue.length) {
      op.pickList = orderQueue.shift();
      op.pickIdx = 0;
      op.state = 'walking';
      op.from = op.mesh.position.clone();
      op.target = getPickAislePos(op.pickList[0]);
      op.progress = 0;
      op.orderStart = simTime;
    }
    if (op.state === 'walking') {
      const dist = op.from.distanceTo(op.target);
      op.progress += dt / Math.max(dist / C.WALK_SPD, 0.1);
      if (op.progress >= 1) {
        op.mesh.position.copy(op.target);
        const pick = op.pickList[op.pickIdx];
        op.state = needsRT(pick) ? 'waiting_rt' : 'picking';
        op.progress = 0;
      } else {
        op.mesh.position.lerpVectors(op.from, op.target, Math.min(op.progress, 1));
      }
    }
    if (op.state === 'waiting_rt') {
      const ri = getAvailRT();
      if (ri >= 0) {
        const rt = reachTrucks[ri];
        const pick = op.pickList[op.pickIdx];
        rt.busy = true;
        rt.timer = pick.level * C.RT_LIFT + C.RT_PICK;
        const ap = getPickAislePos(pick);
        rt.mesh.position.set(ap.x, 0, ap.z);
        op.state = 'rt_working';
        op._rtIdx = ri;
      }
    }
    if (op.state === 'rt_working') {
      const rt = reachTrucks[op._rtIdx];
      rt.timer -= dt;
      if (rt.timer <= 0) { rt.busy = false; op.state = 'picking'; op.progress = 0; }
    }
    if (op.state === 'picking') {
      op.progress += dt / C.OP_PICK;
      if (op.progress >= 1) {
        const pick = op.pickList[op.pickIdx];
        addFlash(pick);
        totalPicks++;
        op.pickIdx++;
        if (op.pickIdx >= op.pickList.length) {
          op.state = 'returning';
          op.from = op.mesh.position.clone();
          op.target = KITTING.clone();
          op.progress = 0;
        } else {
          op.state = 'walking';
          op.from = op.mesh.position.clone();
          op.target = getPickAislePos(op.pickList[op.pickIdx]);
          op.progress = 0;
        }
      }
    }
    if (op.state === 'returning') {
      const dist = op.from.distanceTo(op.target);
      op.progress += dt / Math.max(dist / C.WALK_SPD, 0.1);
      if (op.progress >= 1) {
        op.mesh.position.copy(KITTING);
        op.state = 'idle';
        totalOrders++;
        totalPrepTime += (simTime - op.orderStart);
      } else {
        op.mesh.position.lerpVectors(op.from, op.target, Math.min(op.progress, 1));
      }
    }
  }

  for (let i = pickFlashes.length - 1; i >= 0; i--) {
    pickFlashes[i].timer -= rawDt;
    pickFlashes[i].mesh.material.opacity = Math.max(0, pickFlashes[i].timer / 0.4);
    pickFlashes[i].mesh.scale.setScalar(1 + (0.4 - pickFlashes[i].timer) * 3);
    if (pickFlashes[i].timer <= 0) { scene.remove(pickFlashes[i].mesh); pickFlashes.splice(i, 1); }
  }

  if (camMode === 'follow') {
    const op = operators[followOpIdx % operators.length];
    const tp = op.mesh.position;
    camera.position.lerp(new THREE.Vector3(tp.x + 5, 8, tp.z + 8), 0.03);
    controls.target.lerp(tp, 0.05);
  } else if (camMode === 'topdown') {
    camera.position.lerp(new THREE.Vector3(BUILD.width_m / 2, 70, -BUILD.depth_m / 2), 0.02);
    controls.target.lerp(new THREE.Vector3(BUILD.width_m / 2, 0, -BUILD.depth_m / 2), 0.02);
  } else if (camMode === 'cinematic') {
    cinematicAngle += rawDt * 0.15;
    const r = 50;
    camera.position.set(
      BUILD.width_m / 2 + Math.cos(cinematicAngle) * r,
      25 + Math.sin(cinematicAngle * 0.3) * 8,
      -BUILD.depth_m / 2 + Math.sin(cinematicAngle) * r
    );
    controls.target.lerp(new THREE.Vector3(BUILD.width_m / 2, 3, -BUILD.depth_m / 2), 0.02);
  }

  const h = Math.floor(simTime / 3600), mn = Math.floor((simTime % 3600) / 60);
  document.getElementById('hud-time').textContent = `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
  document.getElementById('hud-orders').textContent = totalOrders;
  document.getElementById('hud-rt').textContent = `${reachTrucks.filter(r=>r.busy).length} / ${C.NUM_RT}`;
  document.getElementById('hud-picks').textContent = totalPicks;
  document.getElementById('hud-prep').textContent = totalOrders > 0 ? `${(totalPrepTime/totalOrders/60).toFixed(1)} min` : '-';
  document.getElementById('hud-milkrun').textContent = `—`;
}

function animate() {
  requestAnimationFrame(animate);
  update();
  controls.update();
  renderer.render(scene, camera);
  if (labelRenderer) labelRenderer.render(scene, camera);
}
animate();

// ── UI handlers ─────────────────────────────────────────────────────────────
document.getElementById('btn-play').onclick = () => {
  paused = !paused;
  document.getElementById('btn-play').textContent = paused ? 'Play' : 'Pause';
};
document.getElementById('speed').oninput = e => {
  speedMult = parseInt(e.target.value);
  document.getElementById('speed-label').textContent = speedMult + 'x';
};
document.getElementById('policy').onchange = e => {
  genFreqs(e.target.value);
  simTime = 0; totalPicks = 0; totalOrders = 0; totalPrepTime = 0;
  orderQueue = [];
  operators.forEach(op => { op.state = 'idle'; op.mesh.position.copy(KITTING); });
};
const camModes = ['free', 'follow', 'topdown', 'cinematic'];
const camLabels = ['Free', 'Follow Op', 'Top Down', 'Cinematic'];
let camIdx = 0;
document.getElementById('btn-cam').onclick = () => {
  camIdx = (camIdx + 1) % camModes.length;
  camMode = camModes[camIdx];
  document.getElementById('btn-cam').textContent = 'Camera: ' + camLabels[camIdx];
  if (camMode === 'follow') followOpIdx = (followOpIdx + 1) % operators.length;
};
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (labelRenderer) labelRenderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
