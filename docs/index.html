<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Warehouse Simulation 3D — FENG 498</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; touch-action: none; }
canvas { display: block; }
#hud {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.82); color: #fff; padding: 12px 14px;
  border-radius: 10px; font-size: 12px; line-height: 1.6;
  backdrop-filter: blur(10px); min-width: 200px; z-index: 10;
  border: 1px solid rgba(255,255,255,0.08);
}
#hud h2 { font-size: 14px; margin-bottom: 6px; color: #4fc3f7; letter-spacing: 0.5px; }
#hud .label { color: #999; }
#hud .val { color: #eee; font-weight: 600; }
#controls {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.82); color: #fff; padding: 8px 14px;
  border-radius: 10px; font-size: 11px; display: flex; gap: 10px; align-items: center;
  backdrop-filter: blur(10px); z-index: 10; flex-wrap: wrap; justify-content: center;
  max-width: 95vw; border: 1px solid rgba(255,255,255,0.08);
}
#controls button {
  background: #4fc3f7; color: #000; border: none; padding: 6px 12px;
  border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 11px;
}
#controls button:hover { background: #81d4fa; }
#controls button.active { background: #ff9800; }
#controls input[type=range] { width: 80px; accent-color: #4fc3f7; }
#policy-select {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.82); color: #fff; padding: 8px 12px;
  border-radius: 10px; backdrop-filter: blur(10px); z-index: 10;
  border: 1px solid rgba(255,255,255,0.08);
}
#policy-select select {
  background: #222; color: #fff; border: 1px solid #444;
  padding: 5px 8px; border-radius: 4px; font-size: 12px;
}
#legend {
  position: absolute; bottom: 60px; right: 10px;
  background: rgba(0,0,0,0.82); color: #fff; padding: 10px 12px;
  border-radius: 10px; font-size: 10px; line-height: 1.8;
  backdrop-filter: blur(10px); z-index: 10;
  border: 1px solid rgba(255,255,255,0.08);
}
@media (max-width: 768px) {
  #hud { font-size: 10px; padding: 8px 10px; min-width: 130px; }
  #hud h2 { font-size: 11px; }
  #controls { font-size: 10px; padding: 6px 8px; gap: 6px; }
  #controls input[type=range] { width: 50px; }
  #controls .desktop-only { display: none; }
  #legend { display: none; }
  #policy-select { top: auto; bottom: 50px; right: 10px; left: 10px; text-align: center; }
}
.ld { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>

<div id="hud">
  <h2>WAREHOUSE SIMULATION</h2>
  <div><span class="label">Time: </span><span class="val" id="hud-time">00:00</span></div>
  <div><span class="label">Orders: </span><span class="val" id="hud-orders">0</span></div>
  <div><span class="label">RT Busy: </span><span class="val" id="hud-rt">0 / 7</span></div>
  <div><span class="label">Picks: </span><span class="val" id="hud-picks">0</span></div>
  <div><span class="label">Avg Prep: </span><span class="val" id="hud-prep">-</span></div>
  <div><span class="label">Milkrun: </span><span class="val" id="hud-milkrun">-</span></div>
</div>

<div id="policy-select">
  <label>Policy: </label>
  <select id="policy">
    <option value="baseline">Baseline (Schneider)</option>
    <option value="usage" selected>Usage-based ABC</option>
    <option value="double">Double ABC</option>
    <option value="travel">Travel-distance Optimized</option>
  </select>
</div>

<div id="legend">
  <div><span class="ld" style="background:#4fc3f7"></span>Operator</div>
  <div><span class="ld" style="background:#f57f17"></span>Reach Truck</div>
  <div><span class="ld" style="background:#4caf50"></span>Kitting Area</div>
  <div><span class="ld" style="background:#f9a825"></span>Fast Mover Rack</div>
  <div><span class="ld" style="background:#607d8b"></span>Standard Rack</div>
  <div><span class="ld" style="background:#1565c0"></span>Kardex</div>
  <div><span class="ld" style="background:#00bfa5"></span>Milkrun</div>
</div>

<div id="controls">
  <button id="btn-play">Pause</button>
  <span>Speed:</span>
  <input type="range" id="speed" min="1" max="200" value="30">
  <span id="speed-label">30x</span>
  <button id="btn-cam">Camera: Free</button>
  <span class="desktop-only" style="color:#666">| Scroll: zoom · Drag: rotate</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let EffectComposer, RenderPass, UnrealBloomPass, SMAAPass, CSS2DRenderer, CSS2DObject;
let useComposer = false, useLabels = false;
try {
  ({ EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js'));
  ({ RenderPass } = await import('three/addons/postprocessing/RenderPass.js'));
  ({ UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js'));
  ({ SMAAPass } = await import('three/addons/postprocessing/SMAAPass.js'));
  useComposer = true;
} catch(e) { console.warn('Post-processing not available:', e); }
try {
  ({ CSS2DRenderer, CSS2DObject } = await import('three/addons/renderers/CSS2DRenderer.js'));
  useLabels = true;
} catch(e) { console.warn('CSS2D labels not available:', e); }

// ── Config ──────────────────────────────────────────────────────────────────
const C = {
  NUM_MODULES: 11, LEVELS: 9, COMPS: 12, PALLETS_PER_COMP: 3,
  AISLE_W: 3.0, KIT_W: 1.6, RACK_DEPTH: 1.3, RACK_H: 7.5, RACK_W: 30.0,
  FM_MAX_LV: 3, NUM_RT: 7, NUM_OPS: 8,
  WALK_SPD: 50/60, RT_SPD: 100/60, RT_LIFT: 15, RT_PICK: 30, OP_PICK: 18,
  SHIFT: 28800, ORDERS: 300, ITEMS_MIN: 5, ITEMS_MAX: 15,
};
C.COMP_W = C.RACK_W / C.COMPS;
C.LV_H = C.RACK_H / C.LEVELS;

// ── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f1a);
scene.fog = new THREE.FogExp2(0x0f0f1a, 0.004);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
camera.position.set(20, 30, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// CSS2D for labels
let labelRenderer = null;
if (useLabels) {
  labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(innerWidth, innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.body.appendChild(labelRenderer.domElement);
}

// Post-processing
let composer = null;
if (useComposer) {
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.15, 0.4, 0.9);
  composer.addPass(bloom);
  const smaa = new SMAAPass(innerWidth, innerHeight);
  composer.addPass(smaa);
}

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(15, 2, -18);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.48;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const sun = new THREE.DirectionalLight(0xfff8e1, 0.7);
sun.position.set(40, 50, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x4fc3f7, 0x1a1a2e, 0.2));

// Ceiling lights (industrial fluorescent feel)
for (let x = 5; x < 30; x += 10) {
  for (let z = -5; z > -45; z -= 8) {
    const strip = new THREE.Mesh(
      new THREE.BoxGeometry(4, 0.05, 0.3),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.2 })
    );
    strip.position.set(x, 9.5, z);
    scene.add(strip);
    const pl = new THREE.PointLight(0xfff8e1, 0.3, 15);
    pl.position.set(x, 9, z);
    scene.add(pl);
  }
}

// Floor
const floorTex = (() => {
  const c = document.createElement('canvas'); c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(0, 0, 512, 512);
  // Grid lines
  ctx.strokeStyle = '#333348'; ctx.lineWidth = 1;
  for (let i = 0; i < 512; i += 32) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,512); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(512,i); ctx.stroke(); }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(8, 8);
  return t;
})();
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.85 })
);
floor.rotation.x = -Math.PI/2;
floor.position.set(15, 0, -20);
floor.receiveShadow = true;
scene.add(floor);

// ── Helper: 3D label ────────────────────────────────────────────────────────
function makeLabel(text, pos, color = '#fff', fontSize = '11px') {
  const div = document.createElement('div');
  div.textContent = text;
  div.style.cssText = `color:${color};font-size:${fontSize};font-family:'Segoe UI',sans-serif;font-weight:600;text-shadow:0 0 6px rgba(0,0,0,0.8);pointer-events:none;`;
  if (!useLabels) return null;
  const lbl = new CSS2DObject(div);
  lbl.position.copy(pos);
  scene.add(lbl);
  return lbl;
}

// ── Warehouse layout ────────────────────────────────────────────────────────
const moduleYs = [];
const moduleHasKit = [];
const aisleZs = []; // z-center of each aisle for operator pathfinding

let zCur = 0;
for (let m = 0; m < C.NUM_MODULES; m++) {
  let hasKit = false;
  if (m > 0 && (m-1)%2 === 1) hasKit = true;
  if (m < C.NUM_MODULES-1 && m%2 === 1) hasKit = true;
  moduleHasKit.push(hasKit);
  moduleYs.push(zCur);

  const rackColor = hasKit ? 0xf9a825 : 0x607d8b;
  const rackMat = new THREE.MeshStandardMaterial({ color: rackColor, roughness: 0.7, metalness: 0.15 });
  const metalMat = new THREE.MeshStandardMaterial({ color: 0x37474f, metalness: 0.7, roughness: 0.25 });

  // Uprights
  for (let c = 0; c <= C.COMPS; c++) {
    const x = c * C.COMP_W;
    const u = new THREE.Mesh(new THREE.BoxGeometry(0.08, C.RACK_H, C.RACK_DEPTH), metalMat);
    u.position.set(x, C.RACK_H/2, -(zCur + C.RACK_DEPTH/2));
    u.castShadow = true;
    scene.add(u);
  }

  // Shelves + boxes
  for (let lv = 0; lv < C.LEVELS; lv++) {
    const y = lv * C.LV_H + 0.05;
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(C.RACK_W, 0.03, C.RACK_DEPTH), rackMat);
    shelf.position.set(C.RACK_W/2, y, -(zCur + C.RACK_DEPTH/2));
    shelf.receiveShadow = true;
    scene.add(shelf);

    // Boxes/pallets on shelves (varied colors for realism)
    const boxColors = [0x8d6e63, 0xa1887f, 0x6d4c41, 0x795548, 0x5d4037, 0x4e342e, 0x3e2723];
    for (let c = 0; c < C.COMPS; c++) {
      // Not every slot is full
      if (Math.sin(m * 7 + c * 3 + lv * 11) > -0.3) {
        const bw = 0.5 + Math.sin(m+c+lv) * 0.15;
        const bh = 0.15 + Math.abs(Math.sin(m*3+c*5+lv*2)) * 0.25;
        const box = new THREE.Mesh(
          new THREE.BoxGeometry(bw, bh, 0.5),
          new THREE.MeshStandardMaterial({ color: boxColors[(m+c+lv)%boxColors.length], roughness: 0.85 })
        );
        box.position.set(c * C.COMP_W + C.COMP_W/2, y + bh/2 + 0.02, -(zCur + C.RACK_DEPTH/2));
        scene.add(box);
      }
    }
  }

  // Module label
  makeLabel(`M${m}${hasKit ? ' ★' : ''}`,
    new THREE.Vector3(-2, 4, -(zCur + C.RACK_DEPTH/2)),
    hasKit ? '#f9a825' : '#90a4ae', '10px');

  zCur += C.RACK_DEPTH;
  if (m < C.NUM_MODULES - 1) {
    const isRT = (m % 2 === 0);
    const gapW = isRT ? C.AISLE_W : C.KIT_W;
    const aisleZ = -(zCur + gapW/2);
    aisleZs.push({ z: aisleZ, isRT, betweenModules: [m, m+1] });

    // Aisle floor stripe
    const stripe = new THREE.Mesh(
      new THREE.PlaneGeometry(C.RACK_W, gapW * 0.8),
      new THREE.MeshStandardMaterial({
        color: isRT ? 0x4a1a1a : 0x1a2a4a,
        transparent: true, opacity: 0.35
      })
    );
    stripe.rotation.x = -Math.PI/2;
    stripe.position.set(C.RACK_W/2, 0.005, aisleZ);
    scene.add(stripe);

    // Dashed center line for RT aisles
    if (isRT) {
      for (let dx = 1; dx < C.RACK_W; dx += 2) {
        const dash = new THREE.Mesh(
          new THREE.PlaneGeometry(1, 0.08),
          new THREE.MeshStandardMaterial({ color: 0xffeb3b, transparent: true, opacity: 0.4 })
        );
        dash.rotation.x = -Math.PI/2;
        dash.position.set(dx, 0.006, aisleZ);
        scene.add(dash);
      }
    }
    zCur += gapW;
  }
}
const totalDepth = zCur;

// ── Walls ───────────────────────────────────────────────────────────────────
const wallMat = new THREE.MeshStandardMaterial({ color: 0x37474f, roughness: 0.85 });
const wallH = 10;
// Back
scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(52, wallH, 0.3), wallMat), { position: new THREE.Vector3(15, wallH/2, -(totalDepth+1)) }));
// Sides
scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.3, wallH, totalDepth+16), wallMat), { position: new THREE.Vector3(-10.5, wallH/2, -(totalDepth/2-5)) }));
scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.3, wallH, totalDepth+16), wallMat), { position: new THREE.Vector3(40.5, wallH/2, -(totalDepth/2-5)) }));
// Ceiling
const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(52, totalDepth+16),
  new THREE.MeshStandardMaterial({ color: 0x263238, roughness: 0.9, side: THREE.DoubleSide })
);
ceiling.rotation.x = Math.PI/2;
ceiling.position.set(15, wallH, -(totalDepth/2-5));
scene.add(ceiling);

// ── Dock doors + outside truck ──────────────────────────────────────────────
for (let i = 0; i < 3; i++) {
  const dx = 6 + i * 10;
  // Door frame
  const frame = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x78909c }));
  frame.position.set(dx, 2, -(totalDepth+1));
  scene.add(frame);
  // Opening
  const opening = new THREE.Mesh(new THREE.BoxGeometry(3.2, 3.2, 0.4),
    new THREE.MeshStandardMaterial({ color: 0x1a1a2e }));
  opening.position.set(dx, 1.8, -(totalDepth+1));
  scene.add(opening);
}

// TIR (outside truck at dock 1)
{
  const truckGroup = new THREE.Group();
  // Trailer
  const trailer = new THREE.Mesh(new THREE.BoxGeometry(3, 3.5, 8),
    new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.6 }));
  trailer.position.set(0, 1.75, -4);
  trailer.castShadow = true;
  truckGroup.add(trailer);
  // Cab
  const cab = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.5, 2.5),
    new THREE.MeshStandardMaterial({ color: 0x1565c0 }));
  cab.position.set(0, 1.5, -8.5);
  truckGroup.add(cab);
  // Windshield
  const windshield = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 1.2),
    new THREE.MeshStandardMaterial({ color: 0x81d4fa, metalness: 0.8, roughness: 0.1 }));
  windshield.position.set(0, 2.2, -7.2);
  truckGroup.add(windshield);
  // Wheels
  for (let s of [-1.2, 1.2]) {
    for (let wz of [-2, -5, -8]) {
      const wh = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.3, 10),
        new THREE.MeshStandardMaterial({ color: 0x111111 }));
      wh.rotation.z = Math.PI/2;
      wh.position.set(s, 0.5, wz);
      truckGroup.add(wh);
    }
  }
  // Schneider logo area (orange stripe)
  const logoStripe = new THREE.Mesh(new THREE.BoxGeometry(3.02, 0.5, 8.02),
    new THREE.MeshStandardMaterial({ color: 0x3ddc84 }));
  logoStripe.position.set(0, 2.8, -4);
  truckGroup.add(logoStripe);

  truckGroup.position.set(6, 0, -(totalDepth + 5));
  scene.add(truckGroup);
  makeLabel('Receiving', new THREE.Vector3(6, 5, -(totalDepth+3)), '#78909c', '11px');
}

// ── Kardex units ────────────────────────────────────────────────────────────
for (let i = 0; i < 4; i++) {
  const k = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4.5, 2),
    new THREE.MeshStandardMaterial({ color: 0x1565c0, roughness: 0.4, metalness: 0.3 }));
  k.position.set(-6, 2.25, -(8 + i * 6));
  k.castShadow = true;
  scene.add(k);
  // Display panel
  const panel = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x00e676, emissive: 0x00e676, emissiveIntensity: 0.3 }));
  panel.position.set(-4.7, 3.5, -(8 + i * 6));
  scene.add(panel);
}
makeLabel('KARDEX', new THREE.Vector3(-6, 5.5, -16), '#42a5f5', '12px');

// ── Trolley area ────────────────────────────────────────────────────────────
const trolleyMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.7 });
for (let i = 0; i < 8; i++) {
  const tg = new THREE.Group();
  tg.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.08, 1.0), trolleyMat), { position: new THREE.Vector3(0, 0.25, 0) }));
  tg.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.7, 0.05), new THREE.MeshStandardMaterial({ color: 0x999 })), { position: new THREE.Vector3(0, 0.6, -0.45) }));
  tg.position.set(22 + (i%4)*2, 0, 4 + Math.floor(i/4)*2);
  scene.add(tg);
}
makeLabel('Trolleys', new THREE.Vector3(26, 2, 5), '#8d6e63', '10px');

// ── Production lines ────────────────────────────────────────────────────────
const prodMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32, transparent: true, opacity: 0.25 });
for (let i = 0; i < 2; i++) {
  const z = -(totalDepth * (0.25 + i * 0.35));
  const zone = new THREE.Mesh(new THREE.PlaneGeometry(3, 8), prodMat);
  zone.rotation.x = -Math.PI/2;
  zone.position.set(38, 0.01, z);
  scene.add(zone);
  // Gate
  const gate = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, 5),
    new THREE.MeshStandardMaterial({ color: 0x388e3c }));
  gate.position.set(39.5, 1.5, z);
  scene.add(gate);
}
makeLabel('SM6-36 Line', new THREE.Vector3(38, 3, -(totalDepth*0.25)), '#66bb6a', '10px');
makeLabel('F400 Line', new THREE.Vector3(38, 3, -(totalDepth*0.6)), '#66bb6a', '10px');

// ── Structural columns ─────────────────────────────────────────────────────
const colMat = new THREE.MeshStandardMaterial({ color: 0x00897b, metalness: 0.5, roughness: 0.4 });
for (let x of [0, 15, 30]) {
  for (let z = -8; z > -(totalDepth); z -= 12) {
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, wallH, 8), colMat);
    col.position.set(x, wallH/2, z);
    col.castShadow = true;
    scene.add(col);
  }
}

// ── Kitting area ────────────────────────────────────────────────────────────
const kitFloor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.08, 6),
  new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 0.6 }));
kitFloor.position.set(8, 0.04, 4);
scene.add(kitFloor);
// Work tables
for (let i = 0; i < 3; i++) {
  const table = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 1),
    new THREE.MeshStandardMaterial({ color: 0x795548, roughness: 0.8 }));
  table.position.set(5 + i * 3, 0.4, 4);
  table.castShadow = true;
  scene.add(table);
}
makeLabel('KIT HAZIRLAMA', new THREE.Vector3(8, 2.5, 4), '#4caf50', '13px');
const KITTING = new THREE.Vector3(8, 0, 4);

// ── Milkrun train ───────────────────────────────────────────────────────────
const milkrunGroup = new THREE.Group();
{
  // Locomotive
  const loco = new THREE.Mesh(new THREE.BoxGeometry(1, 0.6, 1.8),
    new THREE.MeshStandardMaterial({ color: 0x00897b, metalness: 0.3 }));
  loco.position.y = 0.35;
  milkrunGroup.add(loco);
  // Beacon
  const mkBeacon = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.12, 8),
    new THREE.MeshStandardMaterial({ color: 0x00e676, emissive: 0x00e676, emissiveIntensity: 0.6 }));
  mkBeacon.position.set(0, 0.72, 0);
  milkrunGroup.add(mkBeacon);
  // Wagons
  for (let w = 1; w <= 3; w++) {
    const wagon = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.4, 1.2),
      new THREE.MeshStandardMaterial({ color: 0x00695c }));
    wagon.position.set(0, 0.25, w * 1.6);
    milkrunGroup.add(wagon);
    // Load
    const load = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.25, 0.8),
      new THREE.MeshStandardMaterial({ color: 0x8d6e63 }));
    load.position.set(0, 0.55, w * 1.6);
    milkrunGroup.add(load);
  }
  milkrunGroup.position.set(33, 0, 0);
  scene.add(milkrunGroup);
}
makeLabel('Milkrun', new THREE.Vector3(33, 2, 0), '#00bfa5', '10px');

// Milkrun route: goes along the right side, then back
const mkRoute = [];
for (let z = 2; z > -(totalDepth - 2); z -= 2) mkRoute.push(new THREE.Vector3(33, 0, z));
for (let z = -(totalDepth-2); z < 2; z += 2) mkRoute.push(new THREE.Vector3(33, 0, z));
let mkIdx = 0;

// ── Heatmap (ground plane that accumulates traffic) ─────────────────────────
const heatSize = 256;
const heatData = new Uint8Array(heatSize * heatSize * 4);
const heatTex = new THREE.DataTexture(heatData, heatSize, heatSize, THREE.RGBAFormat);
heatTex.needsUpdate = true;
const heatPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(C.RACK_W + 4, totalDepth + 4),
  new THREE.MeshBasicMaterial({ map: heatTex, transparent: true, opacity: 0.35, depthWrite: false })
);
heatPlane.rotation.x = -Math.PI/2;
heatPlane.position.set(C.RACK_W/2, 0.02, -(totalDepth/2));
scene.add(heatPlane);

function addHeat(worldX, worldZ) {
  const u = Math.floor(((worldX + 2) / (C.RACK_W + 4)) * heatSize);
  const v = Math.floor(((-(worldZ) + 2) / (totalDepth + 4)) * heatSize);
  if (u < 0 || u >= heatSize || v < 0 || v >= heatSize) return;
  const idx = (v * heatSize + u) * 4;
  heatData[idx] = Math.min(255, heatData[idx] + 3);     // R
  heatData[idx+1] = Math.min(180, heatData[idx+1] + 1); // G
  heatData[idx+3] = Math.min(200, heatData[idx+3] + 2); // A
  heatTex.needsUpdate = true;
}

// ── Operator model ──────────────────────────────────────────────────────────
const opColors = [0x4fc3f7, 0x81c784, 0xffb74d, 0xf06292, 0xba68c8, 0x4dd0e1, 0xaed581, 0xff8a65];
function createOp(color) {
  const g = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color: 0xffccbc, roughness: 0.7 });
  const vest = new THREE.MeshStandardMaterial({ color, roughness: 0.5 });
  const pants = new THREE.MeshStandardMaterial({ color: 0x37474f });
  const shoes = new THREE.MeshStandardMaterial({ color: 0x212121 });
  const refl = new THREE.MeshStandardMaterial({ color: 0xcccccc, emissive: 0xaaaaaa, emissiveIntensity: 0.15 });

  for (let s of [-0.1, 0.1]) {
    g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.1, 0.2), shoes), { position: new THREE.Vector3(s, 0.05, 0.02) }));
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.065, 0.55, 6), pants), { position: new THREE.Vector3(s, 0.38, 0) }));
  }
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.45, 0.18), vest), { position: new THREE.Vector3(0, 0.9, 0) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.33, 0.025, 0.19), refl), { position: new THREE.Vector3(0, 0.78, 0) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.33, 0.025, 0.19), refl), { position: new THREE.Vector3(0, 0.98, 0) }));
  for (let s of [-0.2, 0.2])
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.04, 0.4, 6), skin), { position: new THREE.Vector3(s, 0.85, 0) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.05, 0.08, 6), skin), { position: new THREE.Vector3(0, 1.2, 0) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 10), skin), { position: new THREE.Vector3(0, 1.35, 0) }));
  // Hard hat
  const hatMat = new THREE.MeshStandardMaterial({ color: 0xfdd835, roughness: 0.4 });
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.02, 10), hatMat), { position: new THREE.Vector3(0, 1.45, 0) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 6, 0, Math.PI*2, 0, Math.PI/2), hatMat), { position: new THREE.Vector3(0, 1.45, 0) }));
  g.castShadow = true;
  return g;
}

function createRT() {
  const g = new THREE.Group();
  const body = new THREE.MeshStandardMaterial({ color: 0xf57f17, metalness: 0.25, roughness: 0.4 });
  const metal = new THREE.MeshStandardMaterial({ color: 0x424242, metalness: 0.8, roughness: 0.2 });
  const dark = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });

  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1, 0.14, 1.8), dark), { position: new THREE.Vector3(0, 0.14, 0) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 1.2), body), { position: new THREE.Vector3(0, 0.5, 0.2) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.45, 0.4), new THREE.MeshStandardMaterial({ color: 0xe65100 })), { position: new THREE.Vector3(0, 0.45, 0.75) }));
  // Cabin pillars + roof
  for (let dx of [-0.4, 0.4]) for (let dz of [-0.1, 0.7])
    g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.1, 0.04), metal), { position: new THREE.Vector3(dx, 1.35, dz) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.88, 0.04, 0.88), metal), { position: new THREE.Vector3(0, 1.92, 0.3) }));
  // Mast
  for (let dx of [-0.14, 0.14])
    g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.05, 3.2, 0.05), metal), { position: new THREE.Vector3(dx, 1.82, -0.65) }));
  for (let y of [0.5, 1.5, 2.5])
    g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.03, 0.03), metal), { position: new THREE.Vector3(0, y, -0.65) }));
  // Forks
  for (let s of [-0.11, 0.11]) {
    g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.035, 1), metal), { position: new THREE.Vector3(s, 0.2, -1.15) }));
    g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.02, 0.12), metal), { position: new THREE.Vector3(s, 0.19, -1.7) }));
  }
  // Wheels
  for (let dx of [-0.45, 0.45])
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.17, 0.09, 10), dark), { position: new THREE.Vector3(dx, 0.11, -0.4), rotation: new THREE.Euler(0, 0, Math.PI/2) }));
  for (let dx of [-0.35, 0.35])
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.07, 8), dark), { position: new THREE.Vector3(dx, 0.08, 0.7), rotation: new THREE.Euler(0, 0, Math.PI/2) }));
  // Beacon
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.08, 8),
    new THREE.MeshStandardMaterial({ color: 0xff6f00, emissive: 0xff6f00, emissiveIntensity: 0.5 })), { position: new THREE.Vector3(0, 2.0, 0.3) }));
  // Headlights
  for (let dx of [-0.3, 0.3])
    g.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0.25 })), { position: new THREE.Vector3(dx, 0.5, -0.65) }));
  return g;
}

// ── Aisle pathfinding for operators ─────────────────────────────────────────
// Operators walk IN the aisles, not through racks.
// For a pick at module m, compartment c:
//   Find the nearest aisle adjacent to that module, walk to (x, aisleZ).
function getPickAislePos(module, comp) {
  const x = comp * C.COMP_W + C.COMP_W / 2;
  // Find aisles adjacent to this module
  let bestAisle = aisleZs[0];
  let bestDist = Infinity;
  for (const a of aisleZs) {
    if (a.betweenModules[0] === module || a.betweenModules[1] === module) {
      const d = Math.abs(a.z - (-(moduleYs[module] + C.RACK_DEPTH/2)));
      if (d < bestDist) { bestDist = d; bestAisle = a; }
    }
  }
  return new THREE.Vector3(x, 0, bestAisle.z);
}

// ── Spawn entities ──────────────────────────────────────────────────────────
const operators = [];
for (let i = 0; i < C.NUM_OPS; i++) {
  const m = createOp(opColors[i % opColors.length]);
  m.position.set(6 + i * 0.7, 0, 4);
  scene.add(m);
  operators.push({ mesh: m, state: 'idle', target: null, from: null, progress: 0, pickList: [], pickIdx: 0, orderStart: 0, _rtIdx: -1 });
}
const reachTrucks = [];
for (let i = 0; i < C.NUM_RT; i++) {
  const m = createRT();
  // Park RTs in the first few RT aisles
  const rtAisles = aisleZs.filter(a => a.isRT);
  const aisle = rtAisles[i % rtAisles.length];
  m.position.set(-4, 0, aisle.z);
  scene.add(m);
  reachTrucks.push({ mesh: m, busy: false, timer: 0 });
}

// ── Simulation state ────────────────────────────────────────────────────────
let simTime = 0, totalPicks = 0, totalOrders = 0, totalPrepTime = 0;
let orderQueue = [], paused = false, speedMult = 30;
let pickFlashes = [];
let milkrunTimer = 0, milkrunTrips = 0;

function posToWorld(mod, comp, lv) {
  return new THREE.Vector3(comp * C.COMP_W + C.COMP_W/2, lv * C.LV_H + 0.3, -(moduleYs[mod] + C.RACK_DEPTH/2));
}

let materialPositions = [];
function genPlacements(policy) {
  materialPositions = [];
  const rng = mulberry32(42);
  for (let m = 0; m < C.NUM_MODULES; m++) {
    for (let lv = 0; lv < C.LEVELS; lv++) {
      for (let c = 0; c < C.COMPS; c++) {
        let f;
        if (policy === 'usage') f = Math.max(0, 1 - (m*0.08 + lv*0.1)) * (1 + rng()*0.3);
        else if (policy === 'baseline') { const fm = moduleHasKit[m] && lv < C.FM_MAX_LV; f = fm ? (0.5+rng()*0.5) : rng()*0.3; }
        else if (policy === 'double') { const hk = moduleHasKit[m]; f = (hk && lv<3) ? 0.7 : (lv<5 ? 0.3 : 0.1); f += rng()*0.2; }
        else f = Math.max(0, 1 - (m*4 + c*0.5 + lv*2)*0.02);
        materialPositions.push({ module: m, comp: c, level: lv, freq: f });
      }
    }
  }
  const mx = Math.max(...materialPositions.map(p => p.freq));
  materialPositions.forEach(p => p.freq /= mx);
}
function mulberry32(a) { return function() { a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; } }

function pickMats(n) {
  const picks = [], total = materialPositions.reduce((s,p) => s+p.freq, 0);
  for (let i = 0; i < n; i++) {
    let r = Math.random() * total;
    for (const p of materialPositions) { r -= p.freq; if (r <= 0) { picks.push(p); break; } }
  }
  return picks;
}
function genOrder() {
  const n = C.ITEMS_MIN + Math.floor(Math.random()*(C.ITEMS_MAX-C.ITEMS_MIN+1));
  const items = pickMats(n);
  const sorted = []; let cur = KITTING.clone(); const rem = [...items];
  while (rem.length) {
    let bi = 0, bd = Infinity;
    for (let i = 0; i < rem.length; i++) { const d = cur.distanceTo(getPickAislePos(rem[i].module, rem[i].comp)); if (d < bd) { bd = d; bi = i; } }
    sorted.push(rem.splice(bi, 1)[0]);
    cur = getPickAislePos(sorted[sorted.length-1].module, sorted[sorted.length-1].comp);
  }
  return sorted;
}
function needsRT(pick) { return !(moduleHasKit[pick.module] && pick.level < C.FM_MAX_LV); }
function getAvailRT() { return reachTrucks.findIndex(r => !r.busy); }

// Pick flash
const flashGeo = new THREE.SphereGeometry(0.25, 8, 8);
function addFlash(pos) {
  const m = new THREE.Mesh(flashGeo, new THREE.MeshStandardMaterial({ color: 0xff5252, emissive: 0xff5252, emissiveIntensity: 0.8, transparent: true }));
  m.position.copy(pos); m.position.y += 0.5;
  scene.add(m);
  pickFlashes.push({ mesh: m, timer: 0.4 });
}

// Audio context for beeps
let audioCtx;
function beep(freq, dur) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.value = 0.03;
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

// ── Camera modes ────────────────────────────────────────────────────────────
let camMode = 'free'; // free, follow, topdown, cinematic
let followOpIdx = 0;
let cinematicAngle = 0;

// ── Main loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let orderTimer = 0;
genPlacements('usage');

function update() {
  const rawDt = clock.getDelta();
  if (paused) return;
  const dt = rawDt * speedMult;
  simTime += dt;

  if (simTime > C.SHIFT) { simTime = 0; totalPicks = 0; totalOrders = 0; totalPrepTime = 0; milkrunTrips = 0; }

  // Orders
  orderTimer += dt;
  const oi = C.SHIFT / C.ORDERS;
  while (orderTimer >= oi) { orderTimer -= oi; orderQueue.push(genOrder()); }

  // Milkrun
  milkrunTimer += dt;
  if (milkrunTimer > 0.5) {
    milkrunTimer = 0;
    mkIdx = (mkIdx + 1) % mkRoute.length;
    milkrunGroup.position.lerp(mkRoute[mkIdx], 0.3);
    milkrunGroup.lookAt(mkRoute[(mkIdx+1)%mkRoute.length]);
    if (mkIdx === 0) milkrunTrips++;
  }

  // Operators
  for (const op of operators) {
    if (op.state === 'idle' && orderQueue.length) {
      op.pickList = orderQueue.shift();
      op.pickIdx = 0;
      op.state = 'walking';
      op.from = op.mesh.position.clone();
      const pick = op.pickList[0];
      op.target = getPickAislePos(pick.module, pick.comp);
      op.progress = 0;
      op.orderStart = simTime;
    }
    if (op.state === 'walking') {
      const dist = op.from.distanceTo(op.target);
      op.progress += dt / Math.max(dist / C.WALK_SPD, 0.1);
      if (op.progress >= 1) {
        op.mesh.position.copy(op.target);
        const pick = op.pickList[op.pickIdx];
        op.state = needsRT(pick) ? 'waiting_rt' : 'picking';
        op.progress = 0;
      } else {
        op.mesh.position.lerpVectors(op.from, op.target, Math.min(op.progress, 1));
        addHeat(op.mesh.position.x, op.mesh.position.z);
      }
    }
    if (op.state === 'waiting_rt') {
      const ri = getAvailRT();
      if (ri >= 0) {
        const rt = reachTrucks[ri];
        const pick = op.pickList[op.pickIdx];
        rt.busy = true;
        rt.timer = pick.level * C.RT_LIFT + C.RT_PICK;
        const ap = getPickAislePos(pick.module, pick.comp);
        rt.mesh.position.set(ap.x, 0, ap.z);
        beep(800, 0.05);
        op.state = 'rt_working';
        op._rtIdx = ri;
      }
    }
    if (op.state === 'rt_working') {
      const rt = reachTrucks[op._rtIdx];
      rt.timer -= dt;
      if (rt.timer <= 0) { rt.busy = false; op.state = 'picking'; op.progress = 0; }
    }
    if (op.state === 'picking') {
      op.progress += dt / C.OP_PICK;
      if (op.progress >= 1) {
        const pick = op.pickList[op.pickIdx];
        addFlash(posToWorld(pick.module, pick.comp, pick.level));
        totalPicks++;
        op.pickIdx++;
        if (op.pickIdx >= op.pickList.length) {
          op.state = 'returning';
          op.from = op.mesh.position.clone();
          op.target = KITTING.clone();
          op.progress = 0;
        } else {
          op.state = 'walking';
          op.from = op.mesh.position.clone();
          op.target = getPickAislePos(op.pickList[op.pickIdx].module, op.pickList[op.pickIdx].comp);
          op.progress = 0;
        }
      }
    }
    if (op.state === 'returning') {
      const dist = op.from.distanceTo(op.target);
      op.progress += dt / Math.max(dist / C.WALK_SPD, 0.1);
      if (op.progress >= 1) {
        op.mesh.position.copy(KITTING);
        op.state = 'idle';
        totalOrders++;
        totalPrepTime += (simTime - op.orderStart);
      } else {
        op.mesh.position.lerpVectors(op.from, op.target, Math.min(op.progress, 1));
        addHeat(op.mesh.position.x, op.mesh.position.z);
      }
    }
  }

  // Flash decay
  for (let i = pickFlashes.length-1; i >= 0; i--) {
    pickFlashes[i].timer -= rawDt;
    pickFlashes[i].mesh.material.opacity = Math.max(0, pickFlashes[i].timer / 0.4);
    pickFlashes[i].mesh.scale.setScalar(1 + (0.4 - pickFlashes[i].timer) * 3);
    if (pickFlashes[i].timer <= 0) { scene.remove(pickFlashes[i].mesh); pickFlashes.splice(i, 1); }
  }

  // Camera
  if (camMode === 'follow') {
    const op = operators[followOpIdx % operators.length];
    const tp = op.mesh.position;
    camera.position.lerp(new THREE.Vector3(tp.x + 5, 8, tp.z + 8), 0.03);
    controls.target.lerp(tp, 0.05);
  } else if (camMode === 'topdown') {
    camera.position.lerp(new THREE.Vector3(15, 55, -(totalDepth/2)), 0.02);
    controls.target.lerp(new THREE.Vector3(15, 0, -(totalDepth/2)), 0.02);
  } else if (camMode === 'cinematic') {
    cinematicAngle += rawDt * 0.15;
    const r = 45;
    camera.position.set(15 + Math.cos(cinematicAngle)*r, 20 + Math.sin(cinematicAngle*0.3)*8, -(totalDepth/2) + Math.sin(cinematicAngle)*r);
    controls.target.lerp(new THREE.Vector3(15, 3, -(totalDepth/2)), 0.02);
  }

  // HUD
  const h = Math.floor(simTime/3600), mn = Math.floor((simTime%3600)/60);
  document.getElementById('hud-time').textContent = `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
  document.getElementById('hud-orders').textContent = totalOrders;
  document.getElementById('hud-rt').textContent = `${reachTrucks.filter(r=>r.busy).length} / ${C.NUM_RT}`;
  document.getElementById('hud-picks').textContent = totalPicks;
  document.getElementById('hud-prep').textContent = totalOrders > 0 ? `${(totalPrepTime/totalOrders/60).toFixed(1)} min` : '-';
  document.getElementById('hud-milkrun').textContent = `Trip ${milkrunTrips + 1}`;
}

function animate() {
  requestAnimationFrame(animate);
  update();
  controls.update();
  if (composer) composer.render(); else renderer.render(scene, camera);
  if (labelRenderer) labelRenderer.render(scene, camera);
}
animate();

// ── UI handlers ─────────────────────────────────────────────────────────────
document.getElementById('btn-play').onclick = () => {
  paused = !paused;
  document.getElementById('btn-play').textContent = paused ? 'Play' : 'Pause';
  if (!paused && audioCtx?.state === 'suspended') audioCtx.resume();
};
document.getElementById('speed').oninput = e => {
  speedMult = parseInt(e.target.value);
  document.getElementById('speed-label').textContent = speedMult + 'x';
};
document.getElementById('policy').onchange = e => {
  genPlacements(e.target.value);
  simTime = 0; totalPicks = 0; totalOrders = 0; totalPrepTime = 0; milkrunTrips = 0;
  orderQueue = [];
  heatData.fill(0); heatTex.needsUpdate = true;
  operators.forEach(op => { op.state = 'idle'; op.mesh.position.copy(KITTING); });
};
const camModes = ['free', 'follow', 'topdown', 'cinematic'];
const camLabels = ['Free', 'Follow Op', 'Top Down', 'Cinematic'];
let camIdx = 0;
document.getElementById('btn-cam').onclick = () => {
  camIdx = (camIdx + 1) % camModes.length;
  camMode = camModes[camIdx];
  document.getElementById('btn-cam').textContent = 'Camera: ' + camLabels[camIdx];
  if (camMode === 'follow') followOpIdx = (followOpIdx + 1) % operators.length;
};
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (labelRenderer) labelRenderer.setSize(innerWidth, innerHeight);
  if (composer) composer.setSize(innerWidth, innerHeight);
});
// Init audio on first click
document.addEventListener('click', () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }, { once: true });
</script>
